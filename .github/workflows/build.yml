name: Build

# Secret-free validation: the full acceptance ladder (all module tests + lint + the debug APK) on every
# pull request and on pushes to main. release-signing.yml handles the SIGNED release artifact on main;
# this one needs no secrets, so it gates PRs from any branch.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # The CLAUDE.md acceptance ladder: domain + platform + app tests, lint (hard gate), debug APK.
      - name: Test + lint + assemble
        run: ./gradlew :domain:test :platform:test :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
