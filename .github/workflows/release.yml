name: Release

# Publishes a GitHub Release with the signed APK attached — but ONLY when you
# push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
# The Releases page therefore means "I decided this is a release", not "every
# merge". Continuous build/test/artifact on main lives in release-signing.yml.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create the GitHub Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # JDK 21: Robolectric 4.16+ needs it to run tests under SDK 36 (app still targets 17 bytecode).
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Acceptance ladder (CLAUDE.md) — never cut a release from a broken tree.
      - name: Test + lint
        run: ./gradlew :domain:test :platform:test :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ vars.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      # Hard-fail if the APK isn't actually signed (regression guard).
      - name: Verify APK is signed
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # tag_name / name default to the pushed tag (github.ref_name).
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
          # Tags with a pre-release suffix (a hyphen, e.g. v0.1.0-rc1) are
          # published as pre-releases; clean semver tags (v1.0.0) are full releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
