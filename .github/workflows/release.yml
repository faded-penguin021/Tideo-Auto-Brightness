name: Release

# Builds, tests, signs the release APK and attaches it to a GitHub Release.
#
# Triggers (D-115):
#  - release: published  — the PRIMARY trigger. Firing on the *release* event (not the tag push) makes
#    this IMMUNE to `[skip ci]`: GitHub's skip-ci only suppresses `push`/`pull_request` events, so a
#    stray `[skip ci]` in the tagged commit's message (e.g. leaked from a squash-merged commit body)
#    no longer silently skips the release. This matches the owner's flow (releases are cut from the
#    GitHub "Draft a new release" UI, which fires `release: published`).
#  - workflow_dispatch — manual fallback: run the release for any existing tag (e.g. to recover a
#    release whose `push` event was skipped, or to re-attach the APK).
#  - push tags v* — kept for a plain `git tag && git push` flow. When a UI release fires BOTH this and
#    `release: published`, the concurrency group collapses them to a single run.
#
# Continuous build/test/artifact on main lives in build.yml; on-demand signing in release-signing.yml.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build, sign, and attach its APK to (e.g. v1.2.0)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create/update the GitHub Release + upload assets

# The tag this run targets, whichever event fired. (env is unavailable in `concurrency`, so that key
# repeats the expression.)
env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Build the TAGGED commit regardless of which event fired (required for workflow_dispatch,
          # explicit/safe for release + push).
          ref: ${{ env.RELEASE_TAG }}

      # JDK 21: Robolectric 4.16+ needs it to run tests under SDK 36 (app still targets 17 bytecode).
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Acceptance ladder (CLAUDE.md) — never cut a release from a broken tree.
      - name: Test + lint
        run: ./gradlew :domain:test :platform:test :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ vars.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      # Hard-fail if the APK isn't actually signed (regression guard).
      - name: Verify APK is signed
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk

      # Reuse the human-written F-Droid changelog as the release body's "What's new" section (D-123).
      # F-Droid names changelogs by *versionCode* (not the tag/versionName), so read the versionCode from
      # the tagged build and look up fastlane/metadata/.../changelogs/<versionCode>.txt. Idempotent: a
      # hidden HTML-comment marker keyed by versionCode is written into the body; if it's already present
      # (re-run via workflow_dispatch, or both push+release fired), an EMPTY notes file is emitted so
      # action-gh-release's append is a no-op and the block is never duplicated. Missing changelog →
      # warn + empty file (the release still publishes with just the auto "What's Changed").
      - name: Prepare F-Droid changelog for the release body
        id: fdroid_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES="$RUNNER_TEMP/fdroid_notes.md"
          : > "$NOTES"   # default: empty → append is a no-op
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

          VCODE=$(grep -oE 'versionCode[[:space:]]*=[[:space:]]*[0-9]+' app/build.gradle.kts | grep -oE '[0-9]+' | head -1)
          if [ -z "${VCODE:-}" ]; then
            echo "::warning::Could not read versionCode from app/build.gradle.kts; skipping F-Droid changelog."
            exit 0
          fi
          CHANGELOG="fastlane/metadata/android/en-US/changelogs/${VCODE}.txt"
          if [ ! -f "$CHANGELOG" ]; then
            echo "::warning::No F-Droid changelog at $CHANGELOG (versionCode $VCODE); skipping."
            exit 0
          fi

          MARKER="<!-- fdroid-changelog:${VCODE} -->"
          EXISTING=$(gh release view "$RELEASE_TAG" --json body --jq '.body // ""' 2>/dev/null || true)
          if printf '%s' "$EXISTING" | grep -qF "$MARKER"; then
            echo "F-Droid changelog (versionCode $VCODE) already in the release body; leaving it unchanged."
            exit 0
          fi

          {
            echo "$MARKER"
            echo "## What's new"
            echo
            cat "$CHANGELOG"
          } > "$NOTES"
          echo "Prepared F-Droid changelog (versionCode $VCODE) for the release body."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
          # Body layout (action-gh-release composes existing + "\n" + body, then + "\n\n" + generated notes):
          #   1. the owner's "Draft a new release" UI summary (existing body, preserved)
          #   2. the F-Droid "What's new" changelog (D-123, from the step above; empty on re-runs → no-op)
          #   3. GitHub's auto "What's Changed" (merged PRs + new contributors since the previous tag, D-119)
          # action-gh-release does NOT overwrite the owner's text. Re-running is idempotent for (2) via the
          # marker guard above; (3) is GitHub's generated block.
          body_path: ${{ steps.fdroid_notes.outputs.path }}
          append_body: true
          generate_release_notes: true
          # Tags with a pre-release suffix (a hyphen, e.g. v0.1.0-rc1) are published as pre-releases.
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
