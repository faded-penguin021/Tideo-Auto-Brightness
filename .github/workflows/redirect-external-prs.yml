name: Redirect external PRs

# Tideo is the downstream native-app build of Advanced Auto Brightness (the upstream source of truth).
# Direct PRs from anyone other than the maintainer are closed with a redirect to AAB (see CONTRIBUTING.md).
# Branch protection on main is the authoritative guard; this is a courtesy auto-redirect on top of it.
#
# Safe by construction: pull_request_target runs in the BASE repo context and this job never checks out
# or executes the PR's code — it only posts a comment and closes the PR.
on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  redirect:
    # Skip the maintainer's own PRs and bot PRs (e.g. Dependabot).
    if: >-
      github.event.pull_request.user.login != 'faded-penguin021' &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              `Thanks @${pr.user.login}, but **Tideo Auto Brightness does not accept direct pull requests.**`,
              ``,
              `Tideo is the native-app *build* of [Advanced Auto Brightness](https://github.com/faded-penguin021/AdvancedAutoBrightness) (AAB), which is the source of truth. Please take features and code changes to **AAB** (open an issue there first), and use this repository's **issues** only for Tideo-specific app/build bugs.`,
              ``,
              `See [CONTRIBUTING.md](https://github.com/faded-penguin021/tideo-auto-brightness/blob/main/CONTRIBUTING.md). Closing automatically.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: 'closed',
            });
