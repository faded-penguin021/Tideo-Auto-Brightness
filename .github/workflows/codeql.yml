name: CodeQL

# Static security analysis for the Kotlin/Java sources. Justified by the app's privileged surface:
# it holds WRITE_SECURE_SETTINGS, executes shell commands through a Shizuku user service
# (`cmd wifi status`, `pm grant`), makes an HTTPS geo-IP request (ipwho.is, D-121), and ships an
# AccessibilityService. CodeQL's java-kotlin queries flag command injection, cleartext traffic,
# path traversal, and similar — exactly this attack surface.
#
# build-mode: manual — this app is ~all Kotlin, and CodeQL's `build-mode: none` does NOT analyse
# Kotlin: the action silently falls back to autobuild, whose minimal heuristic build compiles no
# Kotlin, so the extractor sees no source and the job fails ("no source code seen during build").
# Instead we trace a real Gradle Kotlin compile, reusing build.yml's JDK 21 + Android SDK setup.
# The traced build MUST run `--no-build-cache --rerun-tasks`: the CodeQL tracer hooks the kotlinc
# process, but a restored Gradle build cache serves compileKotlin FROM-CACHE (no compiler spawned →
# "no source code seen"). Forcing real compilation is what makes the extractor see the sources.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mon 06:00 UTC) so newly-published queries re-scan a quiet main.
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload results to the Security tab
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Match build.yml: JDK 21 (Robolectric/AGP) + Android SDK (AGP fetches the compile SDK on demand).
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      # Compile the production Kotlin under the CodeQL tracer so the extractor sees every module
      # (assembleDebug compiles :app and its :platform/:domain dependencies). --no-build-cache
      # --rerun-tasks force the kotlinc processes to actually run instead of resolving FROM-CACHE,
      # which is what the tracer needs to observe.
      - name: Build (traced for CodeQL)
        run: ./gradlew :app:assembleDebug --no-daemon --no-build-cache --rerun-tasks

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
